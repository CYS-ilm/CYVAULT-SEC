<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | CYVault Security</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0A192F;color:#FFFFFF;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;}
    h1{font-family:'Space Grotesk',sans-serif;font-size:72px;background:linear-gradient(90deg,#3B82F6,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    p{color:#94A3B8;margin:20px 0 30px;}
    a{background:linear-gradient(90deg,#3B82F6,#06B6D4);color:#fff;padding:12px 30px;border-radius:8px;text-decoration:none;font-weight:600;display:inline-block;}
    a:hover{transform:translateY(-2px);box-shadow:0 10px 30px -8px rgba(59,130,246,0.55);}
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Page not found. The page you're looking for doesn't exist.</p>
    <a href="/">Return Home</a>
  </div>
</body>
</html>
